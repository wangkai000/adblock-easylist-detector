<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>adblock-easylist-detector - Test Page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        padding: 40px 20px;
        max-width: 960px;
        margin: 0 auto;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 4px;
      }
      p.sub {
        color: #888;
        margin-bottom: 24px;
        font-size: 14px;
      }
      button {
        padding: 12px 28px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-right: 12px;
      }
      .btn-primary {
        background: #4f8cff;
        color: white;
      }
      .btn-secondary {
        background: #333;
        color: #ccc;
        border: 1px solid #555;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #result {
        margin-top: 24px;
      }
      .card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card h2 {
        font-size: 18px;
        margin-bottom: 12px;
      }
      .stat {
        display: inline-block;
        margin-right: 24px;
      }
      .stat-value {
        font-size: 28px;
        font-weight: bold;
      }
      .stat-label {
        font-size: 12px;
        color: #888;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
      }
      .badge-green {
        background: #1a3a1a;
        color: #4cff4c;
      }
      .badge-red {
        background: #3a1a1a;
        color: #ff4f4f;
      }
      .badge-yellow {
        background: #3a3a1a;
        color: #ffcf4f;
      }
      .badge-blue {
        background: #1a2a3a;
        color: #4fa8ff;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }
      th,
      td {
        padding: 8px 12px;
        text-align: left;
        border-bottom: 1px solid #2a2a2a;
        font-size: 13px;
      }
      th {
        color: #888;
        font-weight: normal;
      }
      .url-cell {
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #444;
        border-top-color: #4f8cff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .bait-table td:nth-child(2) {
        font-family: monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>🛡️ adblock-easylist-detector</h1>
    <p class="sub">
      基于 EasyList 规则反向探测 + CSS 诱饵元素双重检测 — 安装/关闭 AdBlock 后对比结果
    </p>

    <div>
      <button class="btn-primary" id="btnDetect">开始检测</button>
      <button class="btn-secondary" id="btnClear">清除缓存并重新检测</button>
    </div>

    <div id="result"></div>

    <script type="module">
      // 从 dist 产物加载
      import { createDetector, EASYLIST_RULES } from '../dist/adblock-easylist-detector.esm.js';

      const detector = createDetector({ timeout: 3000, confidenceThreshold: 0.5 });

      const btnDetect = document.getElementById('btnDetect');
      const btnClear = document.getElementById('btnClear');
      const resultEl = document.getElementById('result');

      btnDetect.addEventListener('click', runDetect);
      btnClear.addEventListener('click', () => {
        detector.clearCache();
        runDetect();
      });

      async function runDetect() {
        btnDetect.disabled = true;
        btnDetect.innerHTML = '<span class="spinner"></span>检测中...';
        resultEl.innerHTML = '';

        try {
          const result = await detector.detect();
          renderResult(result);
        } catch (err) {
          resultEl.innerHTML = `<div class="card"><h2>❌ 检测失败</h2><pre style="color:#ff4f4f">${err.message || err}</pre></div>`;
        }

        btnDetect.disabled = false;
        btnDetect.textContent = '重新检测';
      }

      function renderResult(r) {
        const statusBadge = r.detected
          ? '<span class="badge badge-red">⚠️ 检测到 AdBlock</span>'
          : '<span class="badge badge-green">✅ 未检测到 AdBlock</span>';

        const confBadge =
          r.confidence >= 0.8 ? 'badge-red' : r.confidence >= 0.5 ? 'badge-yellow' : 'badge-green';

        const cacheNote = r.fromCache ? ' <span class="badge badge-blue">缓存命中</span>' : '';

        resultEl.innerHTML = `
        <div class="card">
          <h2>检测结果 ${statusBadge}${cacheNote}</h2>
          <div style="margin: 16px 0">
            <div class="stat">
              <div class="stat-value"><span class="badge ${confBadge}">${(r.confidence * 100).toFixed(1)}%</span></div>
              <div class="stat-label">综合置信度</div>
            </div>
            <div class="stat">
              <div class="stat-value">${r.blockedCount} / ${r.totalCount}</div>
              <div class="stat-label">网络拦截</div>
            </div>
            <div class="stat">
              <div class="stat-value">${r.baitHiddenCount} / ${r.baitTotalCount}</div>
              <div class="stat-label">诱饵隐藏</div>
            </div>
            <div class="stat">
              <div class="stat-value">${r.totalDuration}ms</div>
              <div class="stat-label">耗时</div>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>📡 网络探测明细</h2>
          <table>
            <thead><tr><th>#</th><th>规则</th><th>URL</th><th>状态</th><th>耗时</th></tr></thead>
            <tbody>
              ${r.details
                .map((d) => {
                  const rule = EASYLIST_RULES[d.ruleIndex];
                  return `<tr>
                  <td>${d.ruleIndex + 1}</td>
                  <td title="${rule?.description || ''}">${rule?.category || '-'} (${(rule?.confidence * 100).toFixed(0)}%)</td>
                  <td class="url-cell" title="${d.url}">${d.url}</td>
                  <td>${
                    d.blocked
                      ? '<span class="badge badge-red">已拦截</span>'
                      : '<span class="badge badge-green">通过</span>'
                  }</td>
                  <td>${d.duration}ms</td>
                </tr>`;
                })
                .join('')}
            </tbody>
          </table>
        </div>

        <div class="card">
          <h2>🎣 诱饵检测明细</h2>
          ${
            r.baitResults.length === 0
              ? '<p style="color:#888">未启用</p>'
              : `<table class="bait-table">
                <thead><tr><th>#</th><th>className</th><th>状态</th><th>原因</th></tr></thead>
                <tbody>
                  ${r.baitResults
                    .map(
                      (b) => `<tr>
                    <td>${b.baitIndex + 1}</td>
                    <td>${b.description}</td>
                    <td>${
                      b.hidden
                        ? '<span class="badge badge-red">已隐藏</span>'
                        : '<span class="badge badge-green">正常</span>'
                    }</td>
                    <td style="color:#888">${b.reason}</td>
                  </tr>`,
                    )
                    .join('')}
                </tbody>
              </table>`
          }
        </div>
      `;
      }
    </script>
  </body>
</html>
